  About: |
    I’ve always been drawn to how things work.

    Technology, systems, old hardware, new platforms. I like understanding the structure underneath and then helping other people navigate it without friction.

    Over the years, that’s meant leading teams, supporting growing organizations, and translating between technical complexity and real-world needs. I care about building systems that hold up over time and actually make sense to the people using them.

    When I’m not at a keyboard, I’m probably down a retro game rabbit hole or in the garage making sawdust and hoping I measured twice.
